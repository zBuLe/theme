{% assign item_id = include.prefix | append: '-' | append: include.item.title | slugify %}

<li class="nav-item">
  {% if include.item.sublinks %}
    <button type="button" class="nav-toggle" aria-expanded="false" onclick="toggleNavMenu('{{ item_id }}')">
      <span class="nav-label">{{ include.item.title }}</span>
      <span class="nav-icon" id="icon-{{ item_id }}">▼</span>
    </button>
    
    <div id="{{ item_id }}" class="nav-submenu-container">
      <ul class="nav-submenu">
        {% for child in include.item.sublinks %}
          {% include nav-item.html item=child prefix=item_id %}
        {% endfor %}
      </ul>
    </div>
  {% else %}
    <a href="{{ include.item.url | relative_url }}" class="nav-link {% if page.url == include.item.url %}active{% endif %}">
      {{ include.item.title }}
    </a>
  {% endif %}
</li>
