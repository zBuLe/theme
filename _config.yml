# =========================================
# SITE CONFIGURATION
# =========================================
title: Theme
description: A fast, responsive, and accessible documentation theme.
logo: /assets/images/logo.svg

# =========================================
# THEME SETTINGS & UI ICONS
# =========================================
toc_icon: "📖"
theme_icon_light: "☀️"
theme_icon_dark: "🌙"

# =========================================
# AUTOMATIC LAYOUTS
# =========================================
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# =========================================
# BUILD SETTINGS
# =========================================
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
