# =========================================
# SITE CONFIGURATION
# =========================================
title: Theme
description: A fast, responsive, and accessible documentation theme.
logo: /assets/images/logo.svg

# =========================================
# THEME SETTINGS & UI ICONS
# =========================================
# These icons are pulled dynamically into the HTML
#toc_icon: "☰"
theme_icon_light: "🌞"
theme_icon_dark: "🌚"


blog_url: "/blog"
blog_title: "Devlog"


# =========================================
# PLUGINS
# =========================================
plugins:
  - jekyll-paginate-v2

# =========================================
# PAGINATION V2 SETTINGS
# =========================================
pagination:
  enabled: true
  per_page: 5
  permalink: '/page/:num/'
  # Shows 2 numbers before and 2 after the current page (e.g., [1] [2] (3) [4] [5])
  trail:
    before: 2
    after: 2



# =========================================
# AUTOMATIC LAYOUTS
# =========================================
# This tells Jekyll to automatically apply the "default" layout
# to all markdown/html pages in the site.
defaults:
  - scope:
      path: ""
    values:
      layout: "default"

# =========================================
# BUILD SETTINGS
# =========================================
# Exclude these files from the final build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/