# =========================================
# THEME CONFIGURATION (Emerald/Forest)
# =========================================
# Only the tokens you set here override the
# color-mix defaults in style.css.
# Everything else derives automatically from
# --bg, --text, and --accent.
#
# You can override ANY token — it just won't
# derive from the base if you set it explicitly.

colors:
  light:
    bg: "hsl(145, 30%, 98%)"
    text: "hsl(145, 40%, 12%)"
    accent: "hsl(145, 65%, 35%)"
    # Override: pure white panels suit this near-white bg
    bg_light: "hsl(0, 0%, 100%)"
    # Override: match success to the emerald accent
    success: "hsl(145, 70%, 39%)"

  dark:
    bg: "hsl(145, 30%, 10%)"
    text: "hsl(145, 20%, 95%)"
    accent: "hsl(145, 55%, 45%)"
    # Override: tinted panel surface
    bg_light: "hsl(145, 20%, 15%)"
    success: "hsl(145, 60%, 50%)"
