---
layout: default
---

{{ content }}

<div class="post-navigation">
  
  {% if page.previous.url %}
    <a href="{{ page.previous.url | relative_url }}" class="prev-post">
      &larr; {{ page.previous.title }}
    </a>
  {% else %}
    <div class="prev-post empty"></div>
  {% endif %}

  <a href="{{ site.blog_url | relative_url }}" id="back-to-blog-link" class="back-to-blog">
    <i class="fas fa-th-list"></i> Devlog
  </a>

  <script>
    document.addEventListener("DOMContentLoaded", function() {
      const urlParams = new URLSearchParams(window.location.search);
      const fromPage = urlParams.get('from_page');
      const backLink = document.getElementById('back-to-blog-link');
      
      if (fromPage && fromPage > 1) {
        let base = "{{ site.blog_url | relative_url }}";
        if (!base.endsWith('/')) base += '/';
        backLink.href = base + "page/" + fromPage + "/";
      }
    });
  </script>

  {% if page.next.url %}
    <a href="{{ page.next.url | relative_url }}" class="next-post">
      {{ page.next.title }} &rarr;
    </a>
  {% else %}
    <div class="next-post empty"></div>
  {% endif %}

</div>
